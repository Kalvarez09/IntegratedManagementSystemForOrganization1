<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Profile</title>
    <link rel="icon" type="image/svg" href="../../images/icon.svg" >
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/updateData.css">
    <link rel="stylesheet" href="../../css/style.css">
    
</head>
<body>

<script>
    const user = localStorage.getItem('user');
    if (!user) window.location.href = '/pages/MainPage/Login.html';
</script>


<div class="profile-card">

    <!-- Avatar & Name -->
    <div class="profile-avatar" id="avatarInitial">?</div>
    <h2 id="profileName">Loading...</h2>
    <p class="subtitle" id="profileEmail">Loading...</p>

    <!-- Messages -->
    <div class="alert-success-custom" id="successMsg"></div>
    <div class="alert-error-custom" id="errorMsg"></div>

    <!-- 3 Action Buttons -->
    <div class="action-buttons">
        <button class="btn-action" onclick="showSection('nameSection', this)">
             Change Name
        </button>
        <button class="btn-action" onclick="showSection('emailSection', this)">
             Change Email
        </button>
        <button class="btn-action" onclick="showSection('passwordSection', this)">
             Change Password
        </button>
    </div>

    <!-- Name Section -->
    <div class="form-section" id="nameSection">
        <h5> Update Full Name</h5>
        <div class="mb-3">
            <label class="form-label">New Full Name</label>
            <input type="text" id="full_name" class="form-control" placeholder="Enter your full name">
            <div class="invalid-feedback" id="nameError"></div>
        </div>
        <button class="btn-save" onclick="saveName()">Save Name</button>
    </div>

    <!-- Email Section -->
    <div class="form-section" id="emailSection">
        <h5> Update Email Address</h5>
        <div class="mb-3">
            <label class="form-label">New Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="Enter new email">
            <div class="invalid-feedback" id="emailError"></div>
        </div>
        <button class="btn-save" onclick="saveEmail()">Save Email</button>
    </div>

    <!-- Password Section -->
    <div class="form-section" id="passwordSection">
        <h5> Update Password</h5>
        <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" id="currentPassword" class="form-control"
                placeholder="Enter current password">
            <div class="invalid-feedback" id="currentPwError"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" id="newPassword" class="form-control"
                placeholder="Min. 6 characters">
            <div class="invalid-feedback" id="newPwError"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" id="confirmPassword" class="form-control"
                placeholder="Repeat new password">
            <div class="invalid-feedback" id="confirmPwError"></div>
        </div>
        <button class="btn-save" onclick="savePassword()">Save Password</button>
    </div>

    <hr class="divider">

    <!-- Back Button -->
    <button class="btn-back" onclick="goBack()">← Back to Dashboard</button>

</div>

<script src="../../js/updateProfile.js"></script>
</body>
</html>
