    <main class="dashboard-root">
      <header class="dashboard-welcome">
        <h1>Search Documents</h1>
        <p>Search and download documents available to you.</p>
      </header>

      <div class="status-bar" id="statusBar"></div>

      <div class="doc-toolbar">
        <input type="text" id="docSearch" class="doc-search-input" placeholder="Search by title or category...">
        <select id="docCategory" class="doc-filter-select">
          <option value="">All Categories</option>
          <option value="Uncategorized">Uncategorized</option>
          <option value="Meeting Minutes">Meeting Minutes</option>
          <option value="Financial">Financial</option>
          <option value="Policy">Policy</option>
          <option value="Announcements">Announcements</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="result-count" id="resultCount"></div>

      <div class="doc-table-wrap">
        <table class="doc-table">
          <thead>
            <tr><th>Document</th><th>Category</th><th>Uploaded By</th><th>Date</th><th>Action</th></tr>
          </thead>
          <tbody id="docTableBody">
            <tr><td colspan="5" class="doc-empty">Loading documents...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="Memberindex.js" defer></script>
  <script>
    let allDocs = [];

    function getDocIcon(filename) {
      const ext = filename?.split('.').pop()?.toLowerCase();
      const icons = { pdf:'fa-file-pdf', docx:'fa-file-word', doc:'fa-file-word',
        xlsx:'fa-file-excel', xls:'fa-file-excel', png:'fa-file-image', jpg:'fa-file-image', jpeg:'fa-file-image' };
      return 'fas ' + (icons[ext] || 'fa-file');
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderRows(docs) {
      const tbody = document.getElementById('docTableBody');
      document.getElementById('resultCount').textContent =
        `${docs.length} document${docs.length !== 1 ? 's' : ''} found`;

      if (docs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="doc-empty">No documents found.</td></tr>`;
        return;
      }

      tbody.innerHTML = docs.map(doc => `
        <tr>
          <td><div class="doc-cell">
            <div class="doc-icon"><i class="${getDocIcon(doc.filename)}"></i></div>
            <a href="DocumentView.html?id=${doc.id}" style="color:#f1f5f9; text-decoration:none;">${escHtml(doc.title || doc.filename)}</a>
          </div></td>
          <td><span class="cat-pill">${escHtml(doc.category || 'Uncategorized')}</span></td>
          <td>${escHtml(doc.uploader_name || 'Admin')}</td>
          <td>${new Date(doc.uploaded_at).toLocaleDateString()}</td>
          <td>
            <a href="DocumentView.html?id=${doc.id}" class="dl-btn">
              <i class="fas fa-eye"></i> View
            </a>
          </td>
        </tr>
      `).join('');
    }

    function filterDocs() {
      const q   = document.getElementById('docSearch').value.toLowerCase();
      const cat = document.getElementById('docCategory').value;
      renderRows(allDocs.filter(d =>
        (!q || (d.title||d.filename).toLowerCase().includes(q) || (d.category||'').toLowerCase().includes(q)) &&
        (!cat || d.category === cat)
      ));
    }

    async function downloadDoc(id, filename) {
      try {
        const res = await fetch(`/api/documents/download/${id}`);
        if (res.status === 403) { showStatus('You do not have permission to download this file.', 'error'); return; }
        if (!res.ok) { showStatus('File not found or has been removed.', 'error'); return; }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      } catch { showStatus('Could not connect to server.', 'error'); }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusBar');
      el.textContent = msg;
      el.className = 'status-bar ' + type;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    document.getElementById('docSearch').addEventListener('input', filterDocs);
    document.getElementById('docCategory').addEventListener('change', filterDocs);

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const res  = await fetch('/api/documents');
        if (!res.ok) throw new Error();
        const data = await res.json();
        allDocs = data.documents;
        renderRows(allDocs);
      } catch {
        document.getElementById('docTableBody').innerHTML =
          `<tr><td colspan="5" class="doc-empty">Could not load documents.</td></tr>`;
      }
    });
  </script>
