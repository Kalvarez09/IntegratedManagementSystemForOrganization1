<!DOCTYPE html>

<head>

<body>

    <body>
        </div>
        <h1>Forgot your password?</h1>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        <p>GO CRAZY WITH IT YOU ABSOLUTE CSS DEMON!</p>
        <div class="message" id="message"></div>

        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <br>
        <button id="submit-btn" onclick="submitForm()">Send reset link</button>
        <a href="./Login.html" class="back">← Back to login</a>
        </div>

        <script>
            async function submitForm() {
                const email = document.getElementById('email').value.trim();
                const btn = document.getElementById('submit-btn');
                const msg = document.getElementById('message');

                msg.style.display = 'none';

                if (!email) {
                    showMessage('Please enter your email address.', 'error');
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Sending…';

                try {
                    const res = await fetch('/api/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });

                    // Always show success to avoid revealing if email exists
                    showMessage('If that email is registered, you\'ll receive a reset link shortly.', 'success');
                    document.getElementById('email').value = '';
                } catch (err) {
                    showMessage('Something went wrong. Please try again.', 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Send reset link';
                }
            }

            function showMessage(text, type) {
                const msg = document.getElementById('message');
                msg.textContent = text;
                msg.className = 'message ' + type;
                msg.style.display = 'block';
            }

            document.getElementById('email').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') submitForm();
            });
        </script>
    </body>

</body>

</html>
