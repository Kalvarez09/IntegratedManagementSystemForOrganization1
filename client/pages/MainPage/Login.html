<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/svg" href="../../images/icon.svg" >
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
    <!---code for nav bar -->
    <nav class="navbar">
        <ul>
            <li class="left"><a href="home.html">Home</a></li>
            <li class="left"><a href="services.html">Services</a></li>
            <li class="left"><a href="about-us.html">About Us</a></li>
        </ul>
    </nav>
    <!---code for the form, any weird line, ask -->
    <div class="wrapper">
        <form id="loginForm" novalidate>
            <h1>Login</h1>
            <div id="message"></div>
            <div class="input-box">
                <input type="text" placeholder="Email" id="email" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" id="password" required>
            </div>
            <div class="remember-forgot">
                <label>
                    <input type="checkbox"> Remember me
                </label>
                <a href="./forgot-password.html">Forgot password?</a>
            </div>
            <button type="submit" class="btn"> Login</button>
            <div class="register-link">
                <p>Don't have an account?<a href="Register.html"> Register</a></p>
            </div>
        </form>

        <!-- Step 2: Email OTP Verification -->
        <div id="otpStep" style="display:none;">
            <h1>Verify</h1>
            <div id="otpMessage"></div>
            <p style="color:rgba(255,255,255,0.7); font-size:13px; margin: 10px 0 20px; text-align:center; line-height:1.5;">
                A 6-digit verification code was sent to your email address.<br>Enter it below to continue.
            </p>
            <div class="input-box">
                <input type="text" id="otpCode" placeholder="000000" maxlength="6"
                       inputmode="numeric" autocomplete="one-time-code"
                       style="text-align:center; letter-spacing:6px; font-size:20px;">
            </div>
            <button type="button" class="btn" onclick="verifyOtp()">Verify Code</button>
            <div class="register-link" style="margin-top:15px;">
                <p><a href="Login.html" style="color:rgba(255,255,255,0.6);">← Back to Login</a></p>
            </div>
        </div>
    </div>
    <script src="../../js/login.js"></script>
</body>

</html>
