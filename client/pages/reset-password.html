<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="wrapper">
    <div id="form-section">
        <h1>Set a new password</h1>
        <p>Choose a strong password you haven't used before.</p>

        <div class="message" id="message"></div>
        <div class="input-box">
        <label for="password">New password</label>
        <div class="input-wrap">
            <input type="password" id="password" placeholder="At least 8 characters" />
            <span class="toggle-pw" onclick="togglePw('password', this)">show</span>
        </div>
        </div>

        <p class="hint">Minimum 8 characters.</p>
        <div class="input-box">
        <label for="confirm">Confirm password</label>
        <div class="input-wrap">
            <input type="password" id="confirm" placeholder="Repeat password" />
            <span class="toggle-pw" onclick="togglePw('confirm', this)">show</span>
        </div>
        </div>

        <button class="btn" id="submit-btn" onclick="submitForm()">Reset password</button>
    </div>

        <div class="wrapper">
            <div id="invalid-token" style="display: none;">
        <h1>Link expired</h1>
        <p>This reset link is invalid or has already been used.<br>Please request a new one.</p>
        <a href="./forgot-password.html">← Request a new link</a>
            </div><!--div for invalid-token-->
        </div><!--div for wrapper for invalid-token-->
    </div><!--div for main form wrapper-->


    <script src="../js/resetPass.js"></script>
</body>
</html>
